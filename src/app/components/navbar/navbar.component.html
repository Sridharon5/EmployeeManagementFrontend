<div class="app-sidebar__brand">
  <span class="app-sidebar__logo">EM</span>
  <div>
    <span class="app-sidebar__title">Employee MS</span>
    <span class="app-sidebar__subtitle">Operations</span>
  </div>
</div>

<nav class="app-sidebar__nav" aria-label="Main navigation">
  <a
    class="app-sidebar__link"
    routerLink="/dashboard"
    routerLinkActive="active"
    [routerLinkActiveOptions]="{ exact: true }"
  >
    <i class="bi bi-speedometer2 app-sidebar__icon" aria-hidden="true"></i>
    <span>Dashboard</span>
  </a>
  <a class="app-sidebar__link" routerLink="/departments" routerLinkActive="active">
    <i class="bi bi-diagram-3 app-sidebar__icon" aria-hidden="true"></i>
    <span>Departments</span>
  </a>
  <a class="app-sidebar__link" routerLink="/designation" routerLinkActive="active">
    <i class="bi bi-person-badge app-sidebar__icon" aria-hidden="true"></i>
    <span>Designations</span>
  </a>
  <a
    class="app-sidebar__link"
    routerLink="/employee"
    routerLinkActive="active"
    [routerLinkActiveOptions]="{ exact: true }"
  >
    <i class="bi bi-people-fill app-sidebar__icon" aria-hidden="true"></i>
    <span>Employees</span>
  </a>
  <a
    class="app-sidebar__link"
    routerLink="/tasks"
    routerLinkActive="active"
    [routerLinkActiveOptions]="{ exact: true }"
  >
    <i class="bi bi-check2-square app-sidebar__icon" aria-hidden="true"></i>
    <span>{{ auth.isAdmin() ? 'Tasks' : 'My tasks' }}</span>
  </a>
</nav>
